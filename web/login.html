<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Sistema de Convites de Casamento</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/enhancements.css" />
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background: linear-gradient(135deg, var(--primary-color) 0%, var(--accent-color) 100%);
        font-family: 'Inter', sans-serif;
      }

      .login-container {
        background: var(--surface-color);
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 400px;
      }

      .login-header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .login-header h1 {
        font-size: 2rem;
        margin: 0;
        color: var(--primary-color);
      }

      .login-header p {
        font-size: 0.9rem;
        color: var(--text-secondary);
        margin: 0.5rem 0 0 0;
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--text-color);
      }

      .form-group input {
        width: 100%;
        padding: 0.75rem;
        border: 2px solid var(--border-color);
        border-radius: 6px;
        font-size: 1rem;
        transition: all 0.3s ease;
        background: var(--input-background);
        color: var(--text-color);
        box-sizing: border-box;
      }

      .form-group input:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(199, 21, 133, 0.1);
      }

      .form-group input::placeholder {
        color: var(--text-secondary);
      }

      .submit-btn {
        width: 100%;
        padding: 0.75rem;
        background: linear-gradient(135deg, var(--primary-color) 0%, var(--accent-color) 100%);
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 1rem;
      }

      .submit-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(199, 21, 133, 0.3);
      }

      .submit-btn:active {
        transform: translateY(0);
      }

      .submit-btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
      }

      .toggle-form {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.9rem;
      }

      .toggle-form a {
        color: var(--primary-color);
        text-decoration: none;
        font-weight: 600;
        cursor: pointer;
      }

      .toggle-form a:hover {
        text-decoration: underline;
      }

      .message {
        padding: 0.75rem;
        border-radius: 6px;
        margin-bottom: 1rem;
        display: none;
        text-align: center;
        font-size: 0.9rem;
      }

      .message.show {
        display: block;
      }

      .message.error {
        background: #ffebee;
        color: #c62828;
        border: 1px solid #ef5350;
      }

      .message.success {
        background: #e8f5e9;
        color: #2e7d32;
        border: 1px solid #66bb6a;
      }

      [data-theme="light"] {
        --primary-color: #c71585;
        --accent-color: #ff69b4;
        --surface-color: #ffffff;
        --text-color: #1a1a1a;
        --text-secondary: #666666;
        --border-color: #e0e0e0;
        --input-background: #f5f5f5;
      }

      [data-theme="dark"] {
        --primary-color: #ff1493;
        --accent-color: #ff69b4;
        --surface-color: #2a2a2a;
        --text-color: #ffffff;
        --text-secondary: #b0b0b0;
        --border-color: #444444;
        --input-background: #3a3a3a;
      }

      .loading-spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <!-- Login Form -->
      <div id="login-form-container" class="form-container">
        <div class="login-header">
          <h1>💍</h1>
          <h1>Convites</h1>
          <p>Sistema de Casamento</p>
        </div>

        <div id="login-message" class="message"></div>

        <form id="login-form">
          <div class="form-group">
            <label for="login-username">Usuário</label>
            <input
              type="text"
              id="login-username"
              name="username"
              placeholder="Digite seu usuário"
              required
            />
          </div>

          <div class="form-group">
            <label for="login-password">Senha</label>
            <input
              type="password"
              id="login-password"
              name="password"
              placeholder="Digite sua senha"
              required
            />
          </div>

          <button type="submit" class="submit-btn" id="login-btn">
            Entrar
          </button>
        </form>
      </div>
    </div>

    <script>
      // API Client
      const API_BASE =
        window.location.hostname === 'localhost'
          ? 'http://localhost:5000/api'
          : 'http://backend:5000/api';

      function showMessage(containerId, message, type) {
        const messageEl = document.getElementById(containerId);
        messageEl.textContent = message;
        messageEl.className = `message show ${type}`;
        
        if (type === 'success') {
          setTimeout(() => {
            messageEl.className = 'message';
          }, 3000);
        }
      }

      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('login-username').value;
        const password = document.getElementById('login-password').value;
        const btn = document.getElementById('login-btn');
        
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spinner"></span>';
        
        try {
          const response = await fetch(`${API_BASE}/auth/login`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ username, password })
          });
          
          const data = await response.json();
          
          if (!response.ok) {
            showMessage('login-message', data.error || 'Erro ao fazer login', 'error');
            btn.disabled = false;
            btn.innerHTML = 'Entrar';
            return;
          }
          
          // Store token
          localStorage.setItem('auth_token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          
          showMessage('login-message', 'Login realizado! Redirecionando...', 'success');
          setTimeout(() => {
            window.location.href = '/';
          }, 1500);
          
        } catch (error) {
          showMessage('login-message', 'Erro de conexão. Tente novamente.', 'error');
          btn.disabled = false;
          btn.innerHTML = 'Entrar';
        }
      });

      // Apply theme
      const theme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    </script>
  </body>
</html>
