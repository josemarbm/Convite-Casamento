version: '3.8'

services:
  # EvolutionAPI - WhatsApp Integration
  evolution-api:
    image: atendai/evolution-api:v1.8.2
    container_name: evolution-api
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=12345
    volumes:
      - evolution_data:/evolution/instances
      - evolution_store:/evolution/store
    networks:
      - wedding-network
    restart: unless-stopped

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: wedding-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=wedding_root_pass_2024
      - MYSQL_DATABASE=wedding_invites
      - MYSQL_USER=wedding_user
      - MYSQL_PASSWORD=wedding_pass_2024
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - wedding-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  evolution_data:
    driver: local
  evolution_store:
    driver: local
  mysql_data:
    driver: local

networks:
  wedding-network:
    name: wedding_shared_net
    driver: bridge
